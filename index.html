<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Accordatore web cromatico con preset per chitarra, basso e ukulele."
    />
    <meta name="theme-color" content="#ffe94f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Accordatore" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Accordatore</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icon-180.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="tuner-section" aria-labelledby="app-title">
        <header class="app-header">
          <p class="eyebrow">Accordatore</p>
          <button id="startButton" class="primary-button" type="button">
            Avvia microfono
          </button>
          <h1 id="app-title">Accordatore</h1>
        </header>

        <div class="controls-strip" aria-label="Controlli accordatore">
          <label class="control-field" for="tuningSelect">
            <span>Strumento</span>
            <select id="tuningSelect">
              <option value="chromatic">Cromatico</option>
              <option value="guitar" selected>Chitarra</option>
              <option value="bass">Basso</option>
              <option value="ukulele">Ukulele</option>
            </select>
          </label>
          <label class="control-field" for="skinSelect">
            <span>Skin</span>
            <select id="skinSelect">
              <option value="brutal" selected>Brutal</option>
              <option value="neon">Neon</option>
              <option value="pixel">Pixel</option>
            </select>
          </label>
          <label class="control-field" for="referencePitch">
            <span>La</span>
            <input
              id="referencePitch"
              type="number"
              min="400"
              max="480"
              step="1"
              value="440"
              inputmode="numeric"
            />
          </label>
        </div>

        <div class="signal-row" aria-label="Livello del segnale">
          <span id="statusDot" class="status-dot"></span>
          <strong id="statusText">Pronto</strong>
          <span>Volume</span>
          <div class="signal-meter" aria-hidden="true">
            <div id="signalFill" class="signal-fill"></div>
          </div>
          <strong id="signalText">In attesa</strong>
        </div>

        <section class="tuner-panel" aria-label="Indicatore di accordatura">
          <div class="readout">
            <p id="noteName" class="note-name">--</p>
            <p id="frequencyValue" class="frequency-value">-- Hz</p>
          </div>

          <section class="headstock-stage" aria-label="Paletta delle note">
            <div id="noteCue" class="note-cue" aria-live="polite">--</div>
            <div class="headstock-wrap">
              <div class="headstock-art" aria-hidden="true">
                <span class="headstock-peg peg-left peg-one"></span>
                <span class="headstock-peg peg-left peg-two"></span>
                <span class="headstock-peg peg-left peg-three"></span>
                <span class="headstock-peg peg-right peg-one"></span>
                <span class="headstock-peg peg-right peg-two"></span>
                <span class="headstock-peg peg-right peg-three"></span>
                <span class="headstock-string string-one"></span>
                <span class="headstock-string string-two"></span>
                <span class="headstock-string string-three"></span>
                <span class="headstock-string string-four"></span>
                <span class="headstock-string string-five"></span>
                <span class="headstock-string string-six"></span>
              </div>
              <div id="stringList" class="string-list"></div>
            </div>
          </section>

          <div class="intonation-graph">
            <div class="graph-labels" aria-hidden="true">
              <span>Bassa</span>
              <strong>0 cent</strong>
              <span>Alta</span>
            </div>
            <canvas
              id="intonationCanvas"
              class="intonation-canvas"
              width="900"
              height="420"
              aria-label="Grafico dello scostamento in centesimi nel tempo"
            ></canvas>
          </div>

          <strong id="tuningMessage" class="tuning-message">In attesa</strong>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
