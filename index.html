<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Accordatore web cromatico con preset per chitarra, basso e ukulele."
    />
    <meta name="theme-color" content="#ffe94f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Accordatore" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Accordatore</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icon-180.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="tuner-section" aria-labelledby="app-title">
        <header class="app-header">
          <h1 id="app-title">Accordatore</h1>
        </header>

        <div class="controls-strip" aria-label="Controlli accordatore">
          <button
            id="startButton"
            class="primary-button mic-button"
            type="button"
            aria-label="Avvia microfono"
            title="Avvia microfono"
          >
            <span class="mic-icon" aria-hidden="true"></span>
          </button>
          <label class="control-field" for="tuningSelect">
            <span>Strumento</span>
            <select id="tuningSelect">
              <option value="chromatic">Cromatico</option>
              <option value="guitar" selected>Chitarra</option>
              <option value="bass">Basso</option>
              <option value="ukulele">Ukulele</option>
            </select>
          </label>
          <label class="control-field" for="skinSelect">
            <span>Skin</span>
            <select id="skinSelect">
              <option value="brutal" selected>Brutal</option>
              <option value="neon">Neon</option>
              <option value="pixel">Pixel</option>
            </select>
          </label>
          <label class="control-field" for="referencePitch">
            <span>La</span>
            <input
              id="referencePitch"
              type="number"
              min="400"
              max="480"
              step="1"
              value="440"
              inputmode="numeric"
            />
          </label>
        </div>

        <div id="signalRow" class="signal-row" aria-label="Stato e livello del segnale">
          <span id="statusDot" class="status-dot"></span>
          <strong id="statusText">Pronto</strong>
          <span>Volume</span>
          <div class="signal-meter" aria-hidden="true">
            <div id="signalFill" class="signal-fill"></div>
          </div>
          <strong id="signalText" aria-live="polite">In attesa</strong>
        </div>

        <section class="tuner-panel" aria-label="Indicatore di accordatura">
          <div class="readout">
            <p id="noteName" class="note-name">--</p>
            <p id="frequencyValue" class="frequency-value">-- Hz</p>
          </div>

          <section class="headstock-stage" aria-label="Grafico e paletta delle note">
            <div class="graph-labels" aria-hidden="true">
              <span>Bassa</span>
              <strong>0 cent</strong>
              <span>Alta</span>
            </div>
            <canvas
              id="intonationCanvas"
              class="intonation-canvas"
              width="900"
              height="620"
              aria-label="Grafico dello scostamento in centesimi nel tempo"
            ></canvas>
            <div id="noteCue" class="note-cue">--</div>
            <div class="headstock-wrap">
              <div class="headstock-art" aria-hidden="true">
                <svg class="headstock-svg" viewBox="0 0 188 292" focusable="false">
                  <g class="headstock-fill">
                    <rect class="peg-top" x="0" y="66" width="57" height="24" rx="12"></rect>
                    <rect class="peg-middle" x="0" y="122" width="57" height="24" rx="12"></rect>
                    <rect class="peg-bottom" x="0" y="178" width="57" height="24" rx="12"></rect>
                    <rect class="peg-top" x="131" y="66" width="57" height="24" rx="12"></rect>
                    <rect class="peg-middle" x="131" y="122" width="57" height="24" rx="12"></rect>
                    <rect class="peg-bottom" x="131" y="178" width="57" height="24" rx="12"></rect>
                    <rect x="68" y="226" width="52" height="66"></rect>
                    <path
                      d="M94 0C83 0 77 8 74 19C62 17 50 22 42 32L35 186C35 199 47 213 56 224L66 250H122L132 224C141 213 153 199 153 186L146 32C138 22 126 17 114 19C111 8 105 0 94 0Z"
                    ></path>
                  </g>
                  <g class="headstock-ports">
                    <circle class="peg-top" cx="74" cy="78" r="11"></circle>
                    <circle class="peg-middle" cx="74" cy="134" r="11"></circle>
                    <circle class="peg-bottom" cx="74" cy="190" r="11"></circle>
                    <circle class="peg-top" cx="114" cy="78" r="11"></circle>
                    <circle class="peg-middle" cx="114" cy="134" r="11"></circle>
                    <circle class="peg-bottom" cx="114" cy="190" r="11"></circle>
                  </g>
                </svg>
              </div>
              <div id="stringList" class="string-list"></div>
            </div>
          </section>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
