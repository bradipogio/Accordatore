<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Accordatore web cromatico con preset per chitarra, basso e ukulele."
    />
    <title>Accordatore</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="tuner-section" aria-labelledby="app-title">
        <header class="app-header">
          <p class="eyebrow">Accordatore</p>
          <button id="startButton" class="primary-button" type="button">
            Avvia microfono
          </button>
          <h1 id="app-title">Accordatore</h1>
        </header>

        <div class="controls-strip" aria-label="Controlli accordatore">
          <label class="control-field" for="tuningSelect">
            Strumento
            <select id="tuningSelect">
              <option value="chromatic">Cromatico</option>
              <option value="guitar" selected>Chitarra</option>
              <option value="bass">Basso</option>
              <option value="ukulele">Ukulele</option>
            </select>
          </label>
          <label class="control-field" for="referencePitch">
            La centrale
            <input
              id="referencePitch"
              type="number"
              min="400"
              max="480"
              step="1"
              value="440"
              inputmode="numeric"
            />
          </label>
        </div>

        <div class="status-line" role="status" aria-live="polite">
          <span id="statusDot" class="status-dot"></span>
          <span id="statusText">Pronto. Concedi il microfono per iniziare.</span>
        </div>

        <div class="signal-row" aria-label="Livello del segnale">
          <span>Volume</span>
          <div class="signal-meter" aria-hidden="true">
            <div id="signalFill" class="signal-fill"></div>
          </div>
          <strong id="signalText">In attesa</strong>
        </div>

        <section class="tuner-panel" aria-label="Indicatore di accordatura">
          <div class="readout">
            <p id="noteName" class="note-name">--</p>
            <p id="frequencyValue" class="frequency-value">-- Hz</p>
          </div>

          <div class="intonation-graph">
            <div class="graph-labels" aria-hidden="true">
              <span>Bassa</span>
              <strong>0 cent</strong>
              <span>Alta</span>
            </div>
            <canvas
              id="intonationCanvas"
              class="intonation-canvas"
              width="900"
              height="420"
              aria-label="Grafico dello scostamento in centesimi nel tempo"
            ></canvas>
          </div>

          <strong id="tuningMessage" class="tuning-message">In attesa</strong>
        </section>
      </section>

      <section class="string-section" aria-labelledby="strings-title">
        <h2 id="strings-title">Corde</h2>
        <div id="stringList" class="string-list"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
